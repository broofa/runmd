on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # Use a PAT (RELEASE_PLEASE_TOKEN) so that the release PR and its
          # commits trigger the CI workflow.  GITHUB_TOKEN-based pushes are
          # intentionally blocked from triggering further workflows.
          # If the secret is not set, falls back to GITHUB_TOKEN (CI won't run automatically).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          release-type: node

      - run: echo "Release created?... ${{ steps.release.outputs.release_created }}"

      # Steps below handle publication to NPM
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
        if: ${{ steps.release.outputs.release_created }}

      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}

      - run: npm test
        if: ${{ steps.release.outputs.release_created }}

      - run: npm publish --provenance --access public
        if: ${{ steps.release.outputs.release_created }}
